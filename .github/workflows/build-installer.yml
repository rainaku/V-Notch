name: Build Installer (Nightly / On-Demand)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        type: choice
        default: framework-dependent
        options:
          - framework-dependent
          - self-contained
          - both
      publish_nightly:
        description: 'Publish a "nightly" prerelease with a direct download link'
        type: boolean
        default: true
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

permissions:
  contents: write

concurrency:
  group: build-installer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
    steps:
      - id: pick
        shell: bash
        run: |
          choice="${{ github.event.inputs.build_type }}"
          if [ -z "$choice" ]; then choice="framework-dependent"; fi
          case "$choice" in
            self-contained)    matrix='{"include":[{"variant":"self-contained"}]}' ;;
            both)              matrix='{"include":[{"variant":"framework-dependent"},{"variant":"self-contained"}]}' ;;
            *)                 matrix='{"include":[{"variant":"framework-dependent"}]}' ;;
          esac
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  test:
    runs-on: windows-latest
    steps:
      - name: Checkout source (latest code)
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore test project
        run: dotnet restore Tests/VNotch.Tests.csproj

      - name: Run tests
        run: dotnet test Tests/VNotch.Tests.csproj --configuration Release --no-restore --verbosity normal

  build:
    needs: [setup, test]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout source (latest code)
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install NSIS
        run: choco install nsis --no-progress -y
        shell: pwsh

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content V-Notch.csproj
          $base = ($csproj.Project.PropertyGroup.Version | Where-Object { $_ } | Select-Object -First 1).Trim()
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            # Tagged release: the git tag is the source of truth (e.g. v1.7.7 -> 1.7.7).
            $version = $env:GITHUB_REF_NAME.TrimStart('v')
            Write-Host "Tagged release build: $version"
          } else {
            # Nightly / branch build: base major.minor.patch + unique run number.
            $threePart = ($base -split '\.')[0..2] -join '.'
            $version = "$threePart.$env:GITHUB_RUN_NUMBER"
            Write-Host "Nightly build: $version (base $base)"
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build installer (${{ matrix.variant }})
        shell: pwsh
        run: |
          if ('${{ matrix.variant }}' -eq 'self-contained') {
            ./build-installer.ps1 -SelfContained -Version '${{ steps.version.outputs.version }}'
          } else {
            ./build-installer.ps1 -Version '${{ steps.version.outputs.version }}'
          }

      - name: Read app version
        id: ver
        shell: pwsh
        run: |
          $v = (Get-Item "release\V-Notch.exe").VersionInfo.FileVersion
          $short = (git rev-parse --short HEAD)
          "version=$v" >> $env:GITHUB_OUTPUT
          "sha=$short" >> $env:GITHUB_OUTPUT
          Write-Host "Built V-Notch v$v ($short) [${{ matrix.variant }}]"

      - name: Name the setup file
        id: name
        shell: pwsh
        run: |
          if ('${{ matrix.variant }}' -eq 'self-contained') {
            $out = "V-Notch-Setup-SelfContained.exe"
          } else {
            $out = "V-Notch-Setup.exe"
          }
          if ($out -ne "V-Notch-Setup.exe") {
            Copy-Item "installers\V-Notch-Setup.exe" "installers\$out" -Force
            $hash = (Get-FileHash -Algorithm SHA256 "installers\$out").Hash.ToLowerInvariant()
            Set-Content -Path "installers\$out.sha256" -Value "$hash  $out" -NoNewline
          }
          "file=installers/$out" >> $env:GITHUB_OUTPUT
          "checksum=installers/$out.sha256" >> $env:GITHUB_OUTPUT
          "asset=$out" >> $env:GITHUB_OUTPUT

      - name: Upload setup artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name.outputs.asset }}-${{ steps.ver.outputs.version }}-${{ steps.ver.outputs.sha }}
          path: |
            ${{ steps.name.outputs.file }}
            ${{ steps.name.outputs.checksum }}
          if-no-files-found: error
          retention-days: 30

      - name: Publish nightly prerelease
        if: ${{ !startsWith(github.ref, 'refs/tags/') && (github.event_name == 'push' || inputs.publish_nightly) }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly build (latest code)
          prerelease: true
          body: |
            Automated build from the latest commit (`${{ steps.ver.outputs.sha }}`), version `${{ steps.ver.outputs.version }}`.

            > This is an automated build from the `main` branch, not a stable release.

            - `V-Notch-Setup.exe` — lightweight, requires [.NET 10 Desktop Runtime](https://dotnet.microsoft.com/download/dotnet/10.0).
            - `V-Notch-Setup-SelfContained.exe` — runs out of the box, no .NET install required (larger file).
          files: |
            ${{ steps.name.outputs.file }}
            ${{ steps.name.outputs.checksum }}
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish tagged release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: V-Notch ${{ github.ref_name }}
          prerelease: false
          body: |
            Stable release `${{ steps.ver.outputs.version }}` (`${{ steps.ver.outputs.sha }}`).

            - `V-Notch-Setup.exe` — lightweight, requires [.NET 10 Desktop Runtime](https://dotnet.microsoft.com/download/dotnet/10.0).
            - `V-Notch-Setup-SelfContained.exe` — runs out of the box, no .NET install required (larger file).
          files: |
            ${{ steps.name.outputs.file }}
            ${{ steps.name.outputs.checksum }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
