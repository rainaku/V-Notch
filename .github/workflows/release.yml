name: Release Installer

'on':
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  build-installer:
    if: >-
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.head_branch == 'main' || startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [framework-dependent, self-contained]
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # actions/setup-dotnet@v4.3.1
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: '10.0.x'

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis --no-progress -y

      - name: Determine version
        id: version
        shell: pwsh
        env:
          SOURCE_REF: ${{ github.event.workflow_run.head_branch }}
        run: |
          [xml]$csproj = Get-Content V-Notch.csproj
          $base = ($csproj.Project.PropertyGroup.Version | Where-Object { $_ } | Select-Object -First 1).Trim()
          if ($env:SOURCE_REF -like 'v*') {
            $version = $env:SOURCE_REF.TrimStart('v')
          } else {
            $threePart = ($base -split '\.')[0..2] -join '.'
            $version = "$threePart.$env:GITHUB_RUN_NUMBER"
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build installer (${{ matrix.variant }})
        shell: pwsh
        run: |
          if ('${{ matrix.variant }}' -eq 'self-contained') {
            ./build-installer.ps1 -SelfContained -Version '${{ steps.version.outputs.version }}'
          } else {
            ./build-installer.ps1 -Version '${{ steps.version.outputs.version }}'
          }

      - name: Name setup files
        id: artifact
        shell: pwsh
        run: |
          $out = if ('${{ matrix.variant }}' -eq 'self-contained') { 'V-Notch-Setup-SelfContained.exe' } else { 'V-Notch-Setup.exe' }
          if ($out -ne 'V-Notch-Setup.exe') { Copy-Item 'installers\V-Notch-Setup.exe' "installers\$out" -Force }
          $hash = (Get-FileHash -Algorithm SHA256 "installers\$out").Hash.ToLowerInvariant()
          Set-Content -Path "installers\$out.sha256" -Value "$hash  $out" -NoNewline
          "name=$out" >> $env:GITHUB_OUTPUT

      # actions/upload-artifact@v4.6.2
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: |
            installers/${{ steps.artifact.outputs.name }}
            installers/${{ steps.artifact.outputs.name }}.sha256
          if-no-files-found: error

  release:
    needs: build-installer
    if: needs.build-installer.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # actions/download-artifact@v4.3.0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: release-assets
          merge-multiple: true

      # softprops/action-gh-release@v2.2.2
      - uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631
        with:
          tag_name: ${{ startsWith(github.event.workflow_run.head_branch, 'v') && github.event.workflow_run.head_branch || 'nightly' }}
          name: ${{ startsWith(github.event.workflow_run.head_branch, 'v') && format('V-Notch {0}', github.event.workflow_run.head_branch) || 'Nightly build (latest main)' }}
          prerelease: ${{ !startsWith(github.event.workflow_run.head_branch, 'v') }}
          make_latest: ${{ startsWith(github.event.workflow_run.head_branch, 'v') }}
          body: |
            Build from `${{ github.event.workflow_run.head_sha }}`.

            - `V-Notch-Setup.exe` requires [.NET 10 Desktop Runtime](https://dotnet.microsoft.com/download/dotnet/10.0).
            - `V-Notch-Setup-SelfContained.exe` includes required runtime.
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}